<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Websites</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
        }

        /* SIDEBAR */
        #sidebar {
            width: 250px;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            background-color: #2c3e50;
            padding: 20px;
        }

        #sidebar ul {
            list-style-type: none;
        }

        #sidebar li {
            margin-bottom: 15px;
        }

        #sidebar a {
            color: #ecf0f1;
            text-decoration: none;
            font-size: 18px;
            display: block;
            padding: 10px;
            border-radius: 4px;
            transition: background 0.3s;
        }

        #sidebar a:hover,
        #sidebar a.active {
            background-color: #34495e;
            border-left: 4px solid #3498db;
        }

        /* MAIN CONTENT */
        #websites {
            margin-left: 250px;
            padding: 40px;
            width: calc(100% - 250px);
        }

        /* SEARCH BAR */
        #searchBar {
            width: 100%;
            padding: 12px 15px;
            font-size: 18px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-bottom: 20px;
        }

        /* WEBSITE BUTTONS */
        .website-btn {
            display: block;
            width: 100%;
            background-color: #3498db;
            color: white;
            border: none;
            padding: 20px;
            margin: 15px 0;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            text-align: left;
            transition: background 0.2s;
        }

        .website-btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <div id="sidebar">
        <ul>
            <li><a href="/blank-repo-start-from-scratch/home.html">Home</a></li>
            <li><a href="/blank-repo-start-from-scratch/games/games.html">Games</a></li>
            <li><a href="/blank-repo-start-from-scratch/movies-shows/movies-shows.html">Movies / Shows</a></li>
            <li><a class="active" href="/blank-repo-start-from-scratch/websites/websites.html">Websites</a></li>
            <li><a href="/blank-repo-start-from-scratch/about-us/websites.html">About Us</a></li>
        </ul>
    </div>

    <!-- MAIN CONTENT -->
    <div id="websites">

        <h1>Websites</h1>

        <!-- SEARCH BAR -->
        <input type="text" id="searchBar" placeholder="Search websites..." onkeyup="filterButtons()">

        <!-- BUTTON LIST -->
        <button class="website-btn" onclick="window.location.href='https://example.com'">
            Example Website
        </button>

        <button class="website-btn" onclick="window.location.href='https://google.com'">
            Google
        </button>

        <button class="website-btn" onclick="window.location.href='https://youtube.com'">
            YouTube
        </button>

    </div>

    <!-- SEARCH SCRIPT -->
    <script>
        function filterButtons() {
            const input = document.getElementById("searchBar").value.toLowerCase();
            const buttons = document.querySelectorAll(".website-btn");

            buttons.forEach(btn => {
                const text = btn.textContent.toLowerCase();
                btn.style.display = text.includes(input) ? "block" : "none";
            });
        }
    </script>

</body>
</html>
